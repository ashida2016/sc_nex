<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sc_nex - 配置参数管理系统</title>
    <!-- Bootstrap CSS -->
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="{{ url_for('static', filename='css/datatables.min.css') }}" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="{{ url_for('static', filename='css/all.min.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background-color: #1a1d20;
        }

        .navbar-brand {
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .card-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px 10px 0 0 !important;
            font-weight: bold;
        }

        td.details-control {
            cursor: pointer;
            color: #3498db;
        }

        .json-content {
            background-color: var(--bs-tertiary-bg);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-cogs me-2"></i> sc_nex</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="navbarDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-tasks me-1"></i> 管理
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item active" href="#"><i class="fas fa-hand-paper me-1"></i> 手工管理</a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <!-- Search Section -->
            <div class="col-lg-3 col-md-4 mb-4 order-2">
                <div class="card h-100">
                    <div class="card-header"><i class="fas fa-search me-2"></i>组合查询</div>
                    <div class="card-body">
                        <form id="searchForm">
                            <div class="mb-3">
                                <label class="form-label">配置项编号</label>
                                <input type="text" class="form-control" name="config_id" placeholder="8位编号">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">模糊查询 (说明或内容)</label>
                                <input type="text" class="form-control" name="keyword" placeholder="输入说明或内容关键字">
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="form-label">配置项大类</label>
                                    <input type="text" class="form-control" name="category" placeholder="大类 1位">
                                </div>
                                <div class="col-6">
                                    <label class="form-label">简称</label>
                                    <input type="text" class="form-control" name="abbr" placeholder="3位">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">序号</label>
                                <input type="text" class="form-control" name="seq" placeholder="4位">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">更新时间范围</label>
                                <div class="input-group">
                                    <input type="date" class="form-control" name="update_time_start">
                                    <span class="input-group-text">至</span>
                                    <input type="date" class="form-control" name="update_time_end">
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary"><i
                                        class="fas fa-search me-2"></i>查询</button>
                                <button type="reset" class="btn btn-secondary"><i
                                        class="fas fa-undo me-2"></i>重置</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Table and Charts Section -->
            <div class="col-lg-9 col-md-8 order-1">
                <!-- Table Card -->
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-list me-2"></i> 配置项列表</span>
                        <button class="btn btn-success btn-sm" onclick="showAddModal()"><i
                                class="fas fa-plus me-2"></i>添加配置项</button>
                    </div>
                    <div class="card-body">
                        <table id="configTable" class="table table-striped table-hover dt-responsive nowrap"
                            style="width:100%">
                            <thead>
                                <tr>
                                    <th>查看内容</th>
                                    <th>编号</th>
                                    <th>说明</th>
                                    <th>更新时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add / Edit Modal -->
    <div class="modal fade" id="configModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="configModalTitle">配置项</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="configForm">
                        <input type="hidden" id="editMode" value="0">
                        <div class="mb-3">
                            <label class="form-label">配置项编号 (固定8位)</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="configCategory" placeholder="大类: 0-9或大写字母"
                                    maxlength="1" style="flex: 1;" required>
                                <span class="input-group-text">-</span>
                                <input type="text" class="form-control" id="configAbbr" placeholder="简称: 3位字母数字"
                                    maxlength="3" style="flex: 2;" required>
                                <span class="input-group-text">-</span>
                                <input type="text" class="form-control" id="configSeq" placeholder="序号: 4位字母数字"
                                    maxlength="4" style="flex: 2;" required>
                            </div>
                            <div class="form-text text-muted" id="configIdHelp">拼接后格式为: [大类][简称][序号]</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">配置项说明</label>
                            <textarea class="form-control" id="configDesc" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">配置项内容 (JSON格式)</label>
                            <textarea class="form-control json-content" id="configContent" rows="6" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="btnSaveConfig">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">历史履历 - <span id="historyConfigId"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table id="historyTable" class="table table-bordered table-striped" style="width:100%">
                        <thead>
                            <tr>
                                <th>更新时间</th>
                                <th>说明</th>
                                <th>内容 (JSON)</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Format JS -->
    <!-- Bootstrap JS (bundle includes Popper) -->
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <!-- DataTables JS -->
    <script src="{{ url_for('static', filename='js/datatables.min.js') }}"></script>

    <script>
        let dtTable;
        let dtHistory;

        $(document).ready(function () {
            initTable();

            $('#searchForm').on('submit', function (e) {
                e.preventDefault();
                loadTableData();
            });

            $('#searchForm').on('reset', function (e) {
                setTimeout(loadTableData, 100);
            });

            $('#btnSaveConfig').click(saveConfig);

            // Add format event to datatable table
            $('#configTable tbody').on('click', 'td.details-control', function () {
                var tr = $(this).closest('tr');
                var row = dtTable.row(tr);

                if (row.child.isShown()) {
                    row.child.hide();
                    tr.removeClass('shown');
                    $(this).html('<i class="fas fa-plus-circle"></i>');
                } else {
                    row.child(format(row.data())).show();
                    tr.addClass('shown');
                    $(this).html('<i class="fas fa-minus-circle"></i>');
                }
            });
        });

        function initTable() {
            dtTable = $('#configTable').DataTable({
                responsive: true,
                ordering: false,
                columns: [
                    {
                        className: 'details-control text-center',
                        orderable: false,
                        data: null,
                        defaultContent: '<i class="fas fa-plus-circle"></i>'
                    },
                    {
                        data: 'config_id',
                        render: function (data) {
                            if (data && data.length === 8) {
                                return data.substring(0, 1) + '-' + data.substring(1, 4) + '-' + data.substring(4, 8);
                            }
                            return data;
                        }
                    },
                    {
                        data: 'description',
                        render: function (data) {
                            return data.length > 20 ? data.substring(0, 20) + '...' : data;
                        }
                    },
                    {
                        data: 'updated_at',
                        render: function (data) {
                            if (!data) return '';
                            let d = new Date(data);
                            if (isNaN(d.getTime())) return data;
                            let y, m, day, h, min, s;
                            if (typeof data === 'string' && data.indexOf('GMT') !== -1) {
                                y = d.getUTCFullYear(); m = String(d.getUTCMonth() + 1).padStart(2, '0'); day = String(d.getUTCDate()).padStart(2, '0');
                                h = String(d.getUTCHours()).padStart(2, '0'); min = String(d.getUTCMinutes()).padStart(2, '0'); s = String(d.getUTCSeconds()).padStart(2, '0');
                            } else {
                                y = d.getFullYear(); m = String(d.getMonth() + 1).padStart(2, '0'); day = String(d.getDate()).padStart(2, '0');
                                h = String(d.getHours()).padStart(2, '0'); min = String(d.getMinutes()).padStart(2, '0'); s = String(d.getSeconds()).padStart(2, '0');
                            }
                            return y + '-' + m + '-' + day + ' ' + h + ':' + min + ':' + s;
                        }
                    },
                    {
                        data: null,
                        render: function (data, type, row) {
                            return `
                        <button class="btn btn-sm btn-outline-primary me-1" onclick='showEditModal(${JSON.stringify(row)})'><i class="fas fa-edit"></i> 修改</button>
                        <button class="btn btn-sm btn-outline-info me-1" onclick="showHistory('${row.config_id}')"><i class="fas fa-history"></i> 履历</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteConfig('${row.config_id}')"><i class="fas fa-trash"></i> 删除</button>
                    `;
                        }
                    }
                ],
                language: {
                    "processing": "处理中...",
                    "loadingRecords": "载入中...",
                    "lengthMenu": "显示 _MENU_ 项结果",
                    "info": "显示第 _START_ 至 _END_ 项结果，共 _TOTAL_ 项",
                    "infoEmpty": "显示第 0 至 0 项结果，共 0 项",
                    "infoFiltered": "(由 _MAX_ 项结果过滤)",
                    "infoPostFix": "",
                    "search": "搜索:",
                    "emptyTable": "表中数据为空",
                    "zeroRecords": "没有匹配结果",
                    "paginate": {
                        "first": "首页",
                        "previous": "上页",
                        "next": "下页",
                        "last": "末页"
                    }
                }
            });

            dtHistory = $('#historyTable').DataTable({
                responsive: true,
                ordering: false,
                columns: [
                    {
                        data: 'updated_at',
                        width: "15%",
                        render: function (data) {
                            if (!data) return '';
                            let d = new Date(data);
                            if (isNaN(d.getTime())) return data;
                            let y, m, day, h, min, s;
                            if (typeof data === 'string' && data.indexOf('GMT') !== -1) {
                                y = d.getUTCFullYear(); m = String(d.getUTCMonth() + 1).padStart(2, '0'); day = String(d.getUTCDate()).padStart(2, '0');
                                h = String(d.getUTCHours()).padStart(2, '0'); min = String(d.getUTCMinutes()).padStart(2, '0'); s = String(d.getUTCSeconds()).padStart(2, '0');
                            } else {
                                y = d.getFullYear(); m = String(d.getMonth() + 1).padStart(2, '0'); day = String(d.getDate()).padStart(2, '0');
                                h = String(d.getHours()).padStart(2, '0'); min = String(d.getMinutes()).padStart(2, '0'); s = String(d.getSeconds()).padStart(2, '0');
                            }
                            return y + '-' + m + '-' + day + ' ' + h + ':' + min + ':' + s;
                        }
                    },
                    { data: 'description', width: "25%" },
                    {
                        data: 'content',
                        render: function (data) {
                            try {
                                let parsed = JSON.parse(data);
                                return `<div class="json-content">${JSON.stringify(parsed, null, 4)}</div>`;
                            } catch (e) {
                                return data;
                            }
                        }
                    }
                ],
                language: {
                    "processing": "处理中...",
                    "loadingRecords": "载入中...",
                    "lengthMenu": "显示 _MENU_ 项结果",
                    "info": "显示第 _START_ 至 _END_ 项结果，共 _TOTAL_ 项",
                    "infoEmpty": "显示第 0 至 0 项结果，共 0 项",
                    "infoFiltered": "(由 _MAX_ 项结果过滤)",
                    "infoPostFix": "",
                    "search": "搜索:",
                    "emptyTable": "表中数据为空",
                    "zeroRecords": "没有匹配结果",
                    "paginate": {
                        "first": "首页",
                        "previous": "上页",
                        "next": "下页",
                        "last": "末页"
                    }
                }
            });

            loadTableData();
        }

        function format(d) {
            let prettyJson;
            try {
                prettyJson = JSON.stringify(JSON.parse(d.content), null, 4);
            } catch (e) {
                prettyJson = d.content;
            }
            return '<div class="p-3 bg-light border">' +
                '<strong>配置项内容 JSON:</strong><br>' +
                '<pre class="json-content mt-2 mb-0">' + prettyJson + '</pre>' +
                '</div>';
        }

        function loadTableData() {
            let queryParams = $('#searchForm').serialize();
            $.get('/api/configs?' + queryParams, function (res) {
                dtTable.clear().rows.add(res.data).draw();
            });
        }

        function showAddModal() {
            $('#configModalTitle').text('添加配置项');
            $('#editMode').val('0');
            $('#configForm')[0].reset();
            $('#configCategory, #configAbbr, #configSeq').prop('disabled', false);
            $('#configModal').modal('show');
        }

        function showEditModal(row) {
            $('#configModalTitle').text('修改配置项 - ' + row.config_id);
            $('#editMode').val(row.config_id);

            $('#configCategory').val(row.category).prop('disabled', true);
            $('#configAbbr').val(row.abbr).prop('disabled', true);
            $('#configSeq').val(row.seq).prop('disabled', true);

            $('#configDesc').val(row.description);

            try {
                $('#configContent').val(JSON.stringify(JSON.parse(row.content), null, 4));
            } catch (e) {
                $('#configContent').val(row.content);
            }

            $('#configModal').modal('show');
        }

        function saveConfig() {
            const editMode = $('#editMode').val();
            const cat = $('#configCategory').val().toUpperCase();
            const abbr = $('#configAbbr').val();
            const seq = $('#configSeq').val();
            const desc = $('#configDesc').val();
            const content = $('#configContent').val();

            if (!desc || !content) {
                alert("说明和内容必填！");
                return;
            }

            let url = '/api/config';
            let method = 'POST';
            let payload = {
                description: desc,
                content: content
            };

            if (editMode === '0') {
                if (!cat || !abbr || !seq) {
                    alert("编号各段必填！");
                    return;
                }
                let config_id = cat + abbr + seq;
                if (config_id.length !== 8) {
                    alert("编号拼接后必须是8位！");
                    return;
                }
                payload.config_id = config_id;
            } else {
                url = '/api/config/' + editMode;
                method = 'PUT';
            }

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (res) {
                    if (res.success) {
                        $('#configModal').modal('hide');
                        loadTableData();
                    } else {
                        alert(res.msg);
                    }
                },
                error: function (err) {
                    alert(err.responseJSON ? err.responseJSON.msg : "保存失败");
                }
            });
        }

        function deleteConfig(config_id) {
            if (confirm('确定要删除配置项 ' + config_id + ' 吗？')) {
                $.ajax({
                    url: '/api/config/' + config_id,
                    type: 'DELETE',
                    success: function (res) {
                        if (res.success) {
                            loadTableData();
                        } else {
                            alert(res.msg);
                        }
                    }
                });
            }
        }

        function showHistory(config_id) {
            $('#historyConfigId').text(config_id);
            $.get('/api/config/' + config_id + '/history', function (res) {
                dtHistory.clear().rows.add(res.data).draw();
                $('#historyModal').modal('show');
            });
        }
    </script>
</body>

</html>
