{% extends "base.html" %}

{% block title %}主页 - sc_nex{% endblock %}

{% block content %}
<div class="container text-center mt-5 mb-5 pb-5">
    <h1 class="display-3 fw-bold mb-4" style="color: #61dafb; text-shadow: 0 0 10px rgba(97, 218, 251, 0.5);">Stock Cat 系统配置服务器</h1>
    <p class="lead text-muted mb-5" style="max-width: 650px; margin: 0 auto; line-height: 1.6;">
        欢迎来到配置中心节点。这是一套专为数据运维管理与高可用的交易分析而打造的核心服务基站。
    </p>
    <div class="position-relative d-inline-block">
        <img src="{{ url_for('static', filename='img/stock_cat.png') }}" class="img-fluid rounded shadow-lg" alt="Stock Cat" style="max-height: 500px; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.1);">
        <div class="position-absolute w-100 h-100 top-0 start-0" style="box-shadow: inset 0 0 50px rgba(0,0,0,0.5); pointer-events: none; border-radius: inherit;"></div>
    </div>
</div>
{% endblock %}
